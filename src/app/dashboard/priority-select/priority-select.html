<div class="priority-select">
  @if (label()) {
    <span class="priority-select__label infra-text-small">{{ label() }}</span>
  }

  @for (option of options(); track option) {
    <button
      type="button"
      class="priority-select__chip infra-text-small"
      [class.priority-select__chip--active]="value() === option"
      [style.--priority-color]="option === 'all' ? null : 'var(--priority-' + option + ')'"
      (click)="select(option)"
    >
      @if (option !== 'all') {
        <span class="priority-select__dot"></span>
      }
      {{ labelFor(option) }}
    </button>
  }
</div>
